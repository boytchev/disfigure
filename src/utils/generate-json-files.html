		function rnd( x ) {
		
			return Math.round(10000*x)/10000;
		}
		
		// v = [[x,y,z],...] -> [[x,y,z],...,[x,y,z],...]
		function copy(v) {
		
			return [...v, ...v].map(x=>x.map(y=>rnd(y)));
		
		}
		
		// v = [[x,y,z],...] -> [[x,y,z],...,[-x,y,z],...]
		function flip( v ) {

			return [...v, ...(v.map( a => {var b=[...a]; b[0]*=-1; return b} ))].map(x=>x.map(y=>rnd(y)));

		}
		
		// v = [[x,y,z,w],...] -> [[x,y,z,w],...,[-x,-y,z,w],...]
		function flip2( v ) {

			return [...v, ...(v.map( a => {var b=[...a]; b[0]*=-1; b[1]*=-1; return b} ))].map(x=>x.map(y=>rnd(y)));

		}
