<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Custom world</h3></br>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Three from 'three';
		import { positionWorld, vec4 } from 'three/tsl';
		import { OrbitControls } from "three/addons/controls/OrbitControls.js";

		import * as Happy from 'disfigure';
		import {randomPosture} from './random-posture.js';


		// create a custom world

		var renderer = new Three.WebGPURenderer( { antialias: true,  premultipliedAlpha: true } );
		renderer.setSize( innerWidth, innerHeight );
		renderer.setAnimationLoop( animationLoop );

		document.body.appendChild( renderer.domElement );
		document.body.style.overflow = 'hidden';
		document.body.style.margin = '0';
		
		var scene = new Three.Scene( );
		
		var camera = new Three.PerspectiveCamera( 30, innerWidth/innerHeight, 0.1, 1000 );
		camera.position.set( 0, 0, 2 );
		
		// modify the lights
		
		var semilight = new Three.HemisphereLight( 'yellow', 'red', 4 );
		scene.add( semilight );
		
		var controls = new OrbitControls( camera, renderer.domElement );
		controls.enableDamping = true;
		controls.target.set( 0, 0.9, 0 );		

		window.addEventListener( "resize", ( /*event*/ ) => {

			camera.aspect = innerWidth/innerHeight;
			camera.updateProjectionMatrix( );

			renderer.setSize( innerWidth, innerHeight );

		} );

		
		// create men

		var man1 = new Happy.Man( );
		var man2 = new Happy.Man( );
		var man3 = new Happy.Man( );
		var man4 = new Happy.Man( );

		scene.add( man4.pool );

		man4.material.transparent = true;
		man4.material.opacityNode = positionWorld.y.smoothstep(0.4,0.8);

		// animate the scene
		
		function animationLoop( t ) {

			t=t/4000;

			Happy.everybody.forEach( ( p )=>{
				p.position.y = -0.5;
				randomPosture( p, t, p.id );
				p.update();

			} );

			// animating the man
			controls.update();

			renderer.render( scene, camera );

		}
		
	</script>
</body>
</html>
