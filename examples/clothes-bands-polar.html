<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Linear and polar bands</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Happy from 'disfigure';
		import { standingPosture } from './random-posture.js';


		// create a default world

		new Happy.World( );


		// create three persons

		var man1 = new Happy.Man(),
			woman1 = new Happy.Woman();
			
		Happy.pools.man = null;
		Happy.pools.woman = null;
		
		var	man2 = new Happy.Man(),
			woman2 = new Happy.Woman();

		man1.position.x = 0.4;
		man1.torso.y = 90;
		
		man2.position.x = -0.4;
		man2.torso.y = -90;
		
		woman1.position.x = -1;
		woman1.torso.y = 90;

		woman2.position.x = 1;
		woman2.torso.y = -90;


		// define clothing
		man2.dress([
			Happy.bands(
				Happy.velour( 'moccasin' ),
				Happy.velour( 'tomato' ),
				0.03, { blur: 0.05, angle: 90 }
			) ]);
		
		woman1.dress([
			Happy.bands(
				Happy.velour( 'azure' ),
				Happy.latex( 'navy' ),
				0.015, { balance: 0.9, blur: 0.2, angle: 90 }
			) ]);
		
		
		man1.dress([
			Happy.bands(
				Happy.velour( 'moccasin' ),
				Happy.velour( 'tomato' ),
				1/20, { blur: 0.05, angle: 90, polar: true, z: -0.06 }
			) ]);
		
		woman2.dress([
			Happy.bands(
				Happy.velour( 'azure' ),
				Happy.latex( 'navy' ),
				0.015, { balance: 0.9, blur: 0.2, angle: 90, polar: true }
			) ]);
		
		
		// animate the arms
		
		Happy.setAnimationLoop( (t) => {

			for( var somebody of Happy.everybody )
				standingPosture( somebody, t/2000 );

		} );

	</script>
</body>
</html>
