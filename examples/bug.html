<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Directions of motion of legs</h3>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">

		import * as THREE from 'three';
		import * as TSL from 'three/tsl';
		import * as Happy from 'disfigure';
		import * as Red from 'label';


		// create a default world

		new Happy.World( {ground: !false} );



		// create 3 man for X, Y and Z rotations
		var manZ = new Happy.Man( 1.5 );
		manZ.position.x = 0.8;
		manZ.head.attach( new Red.Label( 'Z', 1.3, [0, 0.15, 0.111], [-15,0,0] ) );
		
		
		Happy.Man.pool = null;
		
		
		var manX = new Happy.Man( 1.5 );
		manX.position.x = -0.8;
		manX.head.attach( new Red.Label( 'X', 1.3, [0, 0.15, 0.111], [-15,0,0] ) );
		
setTimeout(()=>{	
console.log(manX.pool.geometry.attributes.uids.array);
console.log(manZ.pool.geometry.attributes.uids.array);
},1000)
		
		// move the people
		
		Happy.setAnimationLoop( ( t )=>{

			manX.head.y = Happy.regular( t/1000, 0, -90, 90 );
			manZ.head.y = Happy.regular( t/200, 0, -90, 90 );

		} );
		
	</script>
</body>
</html>
