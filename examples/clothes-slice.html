<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Defining orientation of slices</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Happy from 'disfigure';
		import { standingPosture } from './random-posture.js';


		// create a default world

		new Happy.World( );


		// create three persons

		var man = new Happy.Man(),
			woman = new Happy.Woman(),
			child = new Happy.Child();

		man.position.x = 0.75;
		woman.position.x = -0.75;


		// define clothing
		man.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( 0.3, 1.35 ),
			Happy.velour( 'crimson' ),
		]);
		
		woman.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( -0.07, 0.03, { front: true } ),
			Happy.velour( 'crimson' ),
		]);
		
		child.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( -0.06, 0.06, { side: true } ),
			Happy.velour( 'crimson' ),
		]);
		
		
		// animate the arms
		
		Happy.setAnimationLoop( (t) => {

			for( var somebody of Happy.everybody )
				standingPosture( somebody, t/2000 );

		} );

	</script>
</body>
</html>
