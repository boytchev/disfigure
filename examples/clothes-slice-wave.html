<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Generating different shapes of wave slices</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import { Color } from 'three';
		import * as Happy from 'disfigure';
		import { standingPosture } from './random-posture.js';


		// create a default world

		new Happy.World( );


		// create three persons

		var man = new Happy.Man(),
			woman = new Happy.Woman(),
			child = new Happy.Child();

		man.position.x = 0.75;
		woman.position.x = -0.75;


		// define clothing
		man.dress([
			Happy.velour( 'MidnightBlue' ),
		
			Happy.slice( 1.3, 2, { wave: 0.15, width: 0.1, sharpness: 1 } ),
			Happy.velour( 'FloralWhite' ),
		
			Happy.slice( 1.15, 1.25, { wave: 0.04, width: 0.05, sharpness: 1 } ),
			Happy.velour( 'MediumSlateBlue' ),
		
			Happy.slice( 1.00, 1.10, { wave: 0.03, width: 0.02, sharpness: 1 } ),
			Happy.latex( 'Magenta' ),
		]);
		
		woman.dress([
			Happy.velour( 'LightSalmon' ),
		
			Happy.slice( 1.43, 2, { wave: 0.2, width: 0.2, sharpness: 0 } ),
			Happy.velour( 'FloralWhite' ),
		
			Happy.slice( 1.08, 1.15, { wave: 0.02, width: 0.05, sharpness: 0 } ),
			Happy.latex( 'dimgray' ),
		
			Happy.slice( 0.95, 1.05, { wave: 0.02, width: 0.02, sharpness: 0 } ),
			Happy.latex( new Color( 2, 2, 1 ) ),
		]);
		
		child.dress([
			Happy.velour( 'LightSeaGreen' ),

			Happy.slice( 1.0, 2, { wave: 0.2, width: 0.02, sharpness: 0 } ),
			Happy.velour( 'FloralWhite' ),
		
			Happy.slice( -1, 0.35, { wave: 0.1, width: 0.15, sharpness: 5 } ),
			Happy.velour( 'dimgray' ),
		]);
		
		
		// animate the arms
		
		Happy.setAnimationLoop( (t) => {

			for( var somebody of Happy.everybody )
				standingPosture( somebody, t/2000 );

		} );

	</script>
</body>
</html>
