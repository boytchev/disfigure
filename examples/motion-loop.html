<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Motion via animation loop</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Three from 'three';
		import * as Happy from 'disfigure';


		// create a default world

		new Happy.World( );



		// create a child
		
		var child = new Happy.Child( );

		child.position.y = 0.36;
		child.waist.x = 10;
		child.l_foot.x = 8;
		child.r_foot.x = 8;
		


		// a ball
		var geometry = new Three.IcosahedronGeometry( 0.21, 2 );
		
		var material = new Three.MeshPhysicalMaterial( {
			color: 'crimson',
			roughness: 0.3,
			metalness: 0.6,
			flatShading: true,
		} );
		
		var ball = new Three.Mesh( geometry, material );
		
		ball.position.set( 0, 0.2, 0.05 );
		ball.receiveShadow = true;
		ball.castShadow = true;
		
		Happy.scene.add( ball );


		// animate the child
		
		Happy.setAnimationLoop( animate );
		
		function animate( t ) {

			t = t/1000;

			var s = Happy.chaotic( t, 0 );
			var c = Happy.chaotic( t, 0.5 );
				
		
			// ball and child positions
		
			ball.position.x = 0.05*s;
			ball.rotation.z = -0.24*s;

			child.position.x = 0.04*s;
			child.position.y = 0.36-0.02*( s**2 );
		
			// motion of child's upper body
		
			child.torso.z = 7*s;
			child.head.z = -20*s;
		
			child.chest.z = -7*s;
			child.chest.y = Happy.chaotic( t, 2, -15, 15 );
		
			child.waist.z = 7*s;
			child.waist.y = Happy.chaotic( t, 1, -15, 15 );
		
			child.l_arm.z = -40+30*s;
			child.r_arm.z = -40-30*c;

			child.l_arm.y = 20+30*c;
			child.r_arm.y = 20-30*s;

			child.l_arm.x = 30*s;
			child.r_arm.x = -30*c;

			child.l_elbow.y = 40+30*c;
			child.r_elbow.y = 40-30*s;

			// motion of child lower body

			child.l_leg.z = -2 + 15 * s;
			child.r_leg.z = -2 - 15 * s;

			child.r_leg.x = 20-2*s;
			child.l_leg.x = 20+2*s;
		
			child.r_knee.x = 30-2*s;
			child.l_knee.x = 30+2*s;
		
			child.l_ankle.z = -25*s;
			child.r_ankle.z = 25*s;

			child.l_ankle.x = -8+5*s;
			child.r_ankle.x = -8-5*s;

		}

	</script>
</body>
</html>
