<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Test body-part zones and overlaps</h3>
	</header>

	<div id="spinner"></div>

	<script src="importmap.js"></script>
	<script type="module">


import { attribute, Fn, int, step, Loop, vec3, positionGeometry, If, float } from 'three/tsl';
import { extras, pivots, ranges } from '../src/assets.js';
		import {World} from '../src/world.js';
		import {Man, Woman, Child} from '../src/body.js';
		import {gradientX, gradientY, gradientYT, gradientXT, gradientLeg, gradientArm, q} from '../src/tsl.js';
import { PURE_QUATS_PER_BODY, QUAT_DATA_INDEX, QUAT_TEXTURE_WIDTH, QUATS_PER_BODY, quatTextureNode } from '../src/quats.js';


var disfigureMatrix = Fn( ([ mat, k ])=>{

	var newMat = mat.toVar();

	If( k.greaterThan( 0 ).and(k.lessThan( 1 )), () => {

		newMat.addAssign( 1 );

	} );
	return newMat;

}, { return: 'float', mat: 'float', k: 'float' } );

var disfigureBodySelect = Fn( ([ ])=>{


	// header
	var p = positionGeometry.toVar( );
	var m = float( 0 ).toVar();

	var figureIndex = attribute( 'uids', 'int' ).mul( QUATS_PER_BODY ).toVar();

	var gender = q( figureIndex, QUAT_DATA_INDEX ).x.mul( PURE_QUATS_PER_BODY ).toVar(); // 52 pivots
	var gender_ex = q( figureIndex, QUAT_DATA_INDEX ).x.mul( 4 ).toVar(); // 4 extras

	// Helper functions for different deformation types

	var disP = ( i, gradient ) => m.assign( disfigureMatrix( m, gradient ) ),
		disY = ( i ) => m.assign( disfigureMatrix( m, gradientY( p, ranges.element( i.add( gender ) ) ) ) ),
		disX = ( i ) => m.assign( disfigureMatrix( m, gradientX( p, ranges.element( i.add( gender ) ) ) ) ),
		disT = ( i ) => m.assign( disfigureMatrix( m, gradientXT( p, ranges.element( i.add( gender ) ), 0 ) ) );

	// Side and region detection

	var isLeft = int( step( p.x, 0 ) ).toVar( ),
		isDown = p.y.lessThan( pivots.element( int( 2 ).add( gender ) ).y ), //below chest
		isHand = p.x.abs().greaterThan( pivots.element( int( 16 ).add( gender ) ).x ); // beyond wrist

	// Helper function to simulate ternary isLeft?left:right

	var pick = ( left, right )=>isLeft.mul( right-left ).add( left ).toVar();
	
	
	If( isDown, ()=>{

		// process legs

		let start = pick( 4, 10 ),
			end = start.add( 5 ).toVar();
		let leg = pick( 0, 1 );

		// foot ankle shin knee thigh
		Loop( { start: start, end: end }, ( { i } ) => disY( i ) );

		// leg
		//disP( end, gradientLeg( p, ranges.element( end ), extras.element( leg ).xy ) );

	} ).Else( ()=>{

		// process hands
		If( isHand, ()=>{

			let thumb = pick( 24, 26 );
			let thumb2 = pick( 2, 3 );

			disP( thumb, gradientXT( p, ranges.element( thumb ), extras.element( thumb2 ).x ) );
			thumb.addAssign( 1 );
			disP( thumb, gradientYT( p, ranges.element( thumb ), extras.element( thumb2 ).y ) );

			let start = pick( 28, 40 ),
				end = start.add( 12 );

			// index, middle, ring, pinky
			Loop( { start: start, end: end }, ( { i } ) => disT( i ) );

		} );

		// process arms

		let start = pick( 16, 20 ),
			end = start.add( 3 );

		// wrist forearm elbow
		Loop( { start: start, end: end }, ( { i } ) => disX( i ) );

		// arm
		disP( end, gradientArm( p, pivots.element( end ), ranges.element( end ) ) );
	} );




	//	process torso

	//Loop( { end: int( 4 ) }, ( { i } ) => disY( i ) );
	Loop( { end: int( 3 ) }, ( { i } ) => disY( i ) );



	// recolor depending on selection level

	//m.assign( m.fract() );

	var col = vec3( 0 ).toVar();
	
	If( m.equal(1), ()=>{col.assign(vec3(1/2,1/2,1/2));} ); //red
	If( m.equal(2), ()=>{col.assign(vec3(0,1,0));} ); //green
	If( m.equal(3), ()=>{col.assign(vec3(0,0,1));} ); //blue
	If( m.equal(4), ()=>{col.assign(vec3(1,1,0));} ); //yellow
	If( m.equal(5), ()=>{col.assign(vec3(1,0,0));} ); //white
	If( m.equal(6), ()=>{col.assign(vec3(1,0,1));} ); //violet
	If( m.equal(7), ()=>{col.assign(vec3(0,1,1));} ); //cyan

	return col;

} );


		// create a default world

		new World( );


		// create a man, a woman and a child

		var man = new Man( );
		man.position.x = -0.75;
		for(var e of man.eulers) e.set(0,0,0);
		
		var woman = new Woman( );
		woman.position.x = 0.75;
		for(var e of woman.eulers) e.set(0,0,0);

		var child = new Child( );
		for(var e of child.eulers) e.set(0,0,0);
		
man.material.colorNode = disfigureBodySelect();
woman.material.colorNode = disfigureBodySelect();
child.material.colorNode = disfigureBodySelect();
		
	</script>
</body>
</html>
