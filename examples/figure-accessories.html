<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Attaching accessories to the body</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Three from 'three';
		import * as Happy from 'disfigure';
		import {randomPosture} from './random-posture.js';


		// create a default world

		new Happy.World();
		Happy.camera.position.set( 0, 1.85, 2 );
		Happy.controls.target.set( 0, 1.5, 0 );
		

		// create a man

		var man = new Happy.Man( );

		var armBracelet = new Three.Mesh(
			new Three.CylinderGeometry( 0.07, 0.07, 0.01 ),
			new Three.MeshPhysicalMaterial( { metalness: 0.9, roughness: 0.3 } ),
		);
		armBracelet.rotation.z = Math.PI/2;

		for( var x = 0.06; x<0.21; x+=0.02 ) {

			armBracelet = armBracelet.clone();
			armBracelet.position.set(x,0.01,-0.01);
			man.l_arm.attach( armBracelet );
			
			armBracelet = armBracelet.clone();
			armBracelet.position.set(-x,0.01,-0.01);
			man.r_arm.attach( armBracelet );
			
			armBracelet = armBracelet.clone();
			armBracelet.position.set(x-0.12,0.01,-0.01);
			man.l_forearm.attach( armBracelet );
			
			armBracelet = armBracelet.clone();
			armBracelet.position.set(-x+0.12,0.01,-0.01);
			man.r_forearm.attach( armBracelet );
			
		}

		
		var headSpike = new Three.Mesh(
			new Three.ConeGeometry( 0.01, 0.15, 6 ).translate(0,0.1,0),
			new Three.MeshPhysicalMaterial( { metalness: 0.9, roughness: 0 } ),
		);

		
		for( var i = 0; i<100; i++ ) {

			var r = ( i**0.5 )*0.18,
				a = 2*Math.PI*i*(1 - 2/(1+Math.sqrt(5)));

			headSpike = headSpike.clone();
			headSpike.position.y = 0.15;
			headSpike.position.z = 0.03;
			headSpike.rotation.set( r*Math.cos(a), 0, r*Math.sin(a) );
			man.head.attach( headSpike );
			
		}

		
		// animate the scene
		
		Happy.setAnimationLoop( ( t )=>{

			t=t/4000;
		
			// animating the man
			randomPosture( man, t, 0 );
			
		} );
		
	</script>
</body>
</html>
