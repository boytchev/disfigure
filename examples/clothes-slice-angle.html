<!DOCTYPE html>

<html>

<body>
	<header>
		<h1><b>Disfigure</b></h1>
		<h3>Rotating slices around axes</h3></br>
	</header>

	<script src="importmap.js"></script>
	<script type="module">

		import * as Happy from 'disfigure';
		import { standingPosture } from './random-posture.js';


		// create a default world

		new Happy.World( );


		// create three persons

		var man = new Happy.Man(),
			woman = new Happy.Woman(),
			child = new Happy.Child();

		man.position.x = 0.75;
		woman.position.x = -0.75;


		// define clothing
		man.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( 0.70, 1.40, { angle: 55 } ),
			Happy.velour( 'black' ),

			Happy.slice( 0.75, 1.35, { angle: 55 } ),
			Happy.velour( 'darkseagreen' ),
		]);
		
		woman.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( 0.6, 1.35, { angle: -45 } ),
			Happy.velour( 'pink' ),

			Happy.slice( 0.65, 1.30, { angle: -45 } ),
			Happy.velour( 'fuchsia' ),

			Happy.slice( 0.70, 1.25, { angle: -45 } ),
			Happy.velour( 'darkorchid' ),
		]);
		
		child.dress([
			Happy.velour( 'white' ),
		
			Happy.slice( 0.4, 0.60, { sideAngle: 30 } ),
			Happy.velour( 'midnightblue' ),

			Happy.slice( 0.5, 0.80, { sideAngle: 45 } ),
			Happy.velour( 'black' ),
		
			Happy.slice( 1.32, 2, { sideAngle: -40 } ),
			Happy.velour( 'orangered' ),
		]);
		
		
		// animate the arms
		
		Happy.setAnimationLoop( (t) => {

			for( var somebody of Happy.everybody )
				standingPosture( somebody, t/2000 );

		} );

	</script>
</body>
</html>
